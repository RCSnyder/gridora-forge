      <h1>Gridora Forge — Free Construction Photo Report Generator</h1>
      <p><strong>Drag. Drop. Label. Export to PDF.</strong></p>
      <p>No Installs &mdash; No Uploads &mdash; 100% Private in Browser</p>

      <p>
        Gridora Forge is a free, browser-based tool built for construction
        workers, site inspectors, consultants, and engineers who need to turn
        jobsite photos into professional PDF reports quickly. No software to
        install, no accounts to create, no photos uploaded to any server —
        everything runs locally on your device.
      </p>

      <h2>Built for the Jobsite</h2>
      <p>
        Whether you're documenting a site inspection, creating a construction
        progress report, building a punch list with photos, or putting together
        a property condition assessment, Gridora Forge gets you from raw photos
        to a polished PDF in minutes. Take photos on your phone, transfer them
        to your laptop, drag them into the app, and export.
      </p>

      <h2>How It Works</h2>
      <ol>
        <li>
          <strong>Add photos</strong> — Drag and drop jobsite photos (JPEG, PNG,
          HEIC from iPhone) or click to browse. Add entire folders at once.
        </li>
        <li>
          <strong>Label and describe</strong> — Give each photo a title (e.g.,
          "North Elevation — Crack in Foundation") and a description with
          observations, measurements, or notes.
        </li>
        <li>
          <strong>Choose a layout</strong> — Pick the right density for your
          report: 1-up for detailed inspection shots, 2-up for paired
          before/after, 2&times;2 or 2&times;3 grids for overview documentation.
        </li>
        <li>
          <strong>Add a title page</strong> — Include your company logo, project
          name, site address, report author, date, and notes on a professional
          cover page.
        </li>
        <li>
          <strong>Export to PDF</strong> — One click generates a print-ready PDF
          with configurable margins, headers, footers, and page numbers.
        </li>
      </ol>

      <h2>Key Features</h2>
      <ul>
        <li>
          Drag-and-drop photo import — supports JPEG, PNG, and HEIC/HEIF from
          iPhones
        </li>
        <li>
          Folder import — add an entire directory of jobsite photos at once
        </li>
        <li>
          Photo captions — title and multi-line description for each image
        </li>
        <li>Photo rotation — fix orientation without leaving the app</li>
        <li>
          Drag-to-reorder — arrange photos in the sequence that tells your story
        </li>
        <li>Four page layouts: 1-up, 2-up, 2&times;2 grid, 2&times;3 grid</li>
        <li>
          Branded cover page with logo, project info, author, date, and notes
        </li>
        <li>
          Configurable PDF margins, custom headers and footers with template
          variables
        </li>
        <li>Page numbers</li>
        <li>Live preview — see exactly what will print before exporting</li>
        <li>
          100% client-side — no uploads, no server, no account, no subscription
        </li>
        <li>Works on Chrome, Firefox, Safari, and Edge</li>
      </ul>

      <h2>Who Uses Gridora Forge?</h2>
      <ul>
        <li>
          <strong>General contractors</strong> — Daily construction progress
          reports with annotated photos
        </li>
        <li>
          <strong>Site inspectors</strong> — Building inspection photo logs for
          code compliance and deficiency documentation
        </li>
        <li>

          reports for clients with branded cover pages
        </li>

        </li>
        <li>
          <strong>Project managers</strong> — Weekly progress photo updates for
          owners and stakeholders
        </li>
        <li>
          <strong>Subcontractors</strong> — Pre-condition photo documentation
          before starting work
        </li>
        <li>
          <strong>Property inspectors</strong> — Residential and commercial
          property condition reports
        </li>
        <li>
          <strong>Insurance adjusters</strong> — Claim documentation with
          detailed photo evidence
        </li>
        <li>
          <strong>Environmental consultants</strong> — Site assessment photo
          documentation
        </li>
        <li>
          <strong>Roofing contractors</strong> — Roof inspection reports with
          labeled damage photos
        </li>
      </ul>

      <h2>Why Gridora Forge Instead of Word or PowerPoint?</h2>
      <p>
        Pasting photos into Word documents or PowerPoint slides is slow,
        tedious, and produces inconsistent results. Gridora Forge is
        purpose-built for photo reports: photos automatically size to fill the
        page, captions stay with their images, layouts are consistent across
        every page, and the exported PDF looks professional every time. What
        takes 30+ minutes in Word takes 2 minutes in Gridora Forge.
      </p>

      <h2>Privacy &amp; Security</h2>
      <p>
        Gridora Forge runs entirely in your web browser using WebAssembly
        technology. Your photos are never uploaded to any server. Your report
        data never leaves your device. This makes it safe for confidential
        project documentation, client-sensitive inspection reports, and any
        situation where data privacy matters.
      </p>
