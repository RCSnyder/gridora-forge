<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Apple Touch Icon – Gridora Forge</title>
    <style>
      /* Exactly 180 × 180 — screenshot at 1× scale */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 180px;
        height: 180px;
        overflow: hidden;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        background: #0c0f14;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      /* Subtle grid pattern */
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(91, 156, 245, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(91, 156, 245, 0.05) 1px, transparent 1px);
        background-size: 20px 20px;
        pointer-events: none;
      }

      /* Accent glow */
      body::after {
        content: "";
        position: absolute;
        top: -40px;
        right: -30px;
        width: 140px;
        height: 140px;
        background: radial-gradient(
          circle,
          rgba(91, 156, 245, 0.15) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 1;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .icon {
        width: 48px;
        height: 48px;
      }

      .brand {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        line-height: 1.1;
        color: #ffffff;
      }

      .brand span {
        color: #5b9cf5;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <svg
        class="icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#5b9cf5"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
        />
        <circle cx="12" cy="13" r="4" />
      </svg>
      <div class="brand">Gridora<br /><span>Forge</span></div>
    </div>
  </body>
</html>
